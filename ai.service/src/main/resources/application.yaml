spring:
  application:
    name: ai.service

  datasource:
    url: jdbc:postgresql://localhost:5432/ai-service
    username: perfectkode
    password: perfectkode
    driver-class-name: org.postgresql.Driver

  jpa:
    database: postgresql
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        globally_quoted_identifiers: true

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    exchange:
      name: hotel-exchange
    queue:
      name: rating-queue
    routing:
      key: hotel.rating

  gemini:
    api:
      url: https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=
      key: AIzaSyBekCNY3jJTYtGFW_XN59FNVAi4cwOj3SQ

  config:
    import: optional:configserver:http://localhost:8095

server:
  port: 8096