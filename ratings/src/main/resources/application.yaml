spring:
  application:
    name: rating-service

  datasource:
    url: jdbc:postgresql://localhost:5433/rating-service
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    database: postgresql
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        globally_quoted_identifiers: true


  ai:
    google:
      genai:
        embedding:
          api-key: ${GEMINI_KEY}
          text:
            options:
              model: text-embedding-004
              dimensions: 768
    vectorstore:
      pgvector:
        initialize-schema: true
        dimensions: 768
        distance-type: COSINE_DISTANCE

  config:
    import: optional:configserver:http://localhost:8095

server:
  port: 8092