spring:
  application:
    name: hotel-service

  datasource:
    url: jdbc:postgresql://localhost:5432/hotel-service
    username: perfectkode
    password: perfectkode
    driver-class-name: org.postgresql.Driver

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8443/realms/hotel-microservice

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    exchange:
      name: hotel-exchange
    queues:
      ratingQueue: rating-queue
      hotelQueue: hotel-embedding-queue
    routing:
      ratingEmbedding: hotel.rating
      hotelEmbedding: hotel.embedding

  jpa:
    database: postgresql
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        globally_quoted_identifiers: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

  config:
    import: optional:configserver:http://localhost:8095

server:
  port: 8091

prefix: http://localhost:8094/api/hotel/public/

file:
  upload-dir: uploads